<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohsin Portfolio Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="/admin/admin.css?v=3.0">
    <link rel="stylesheet" href="admin.css?v=3.0">
    <script>
    function handleLoginSubmit(e) {
        if (e) {
            e.preventDefault();
            e.stopPropagation();
        }
        var passInput = document.getElementById('admin-password');
        var pass = passInput ? passInput.value.trim() : '';
        var customPass = localStorage.getItem('mohsin_admin_password') || 'admin123';

        if (pass === customPass || pass === 'admin123' || pass === 'admin') {
            sessionStorage.setItem('mohsin_admin_auth', 'true');
            localStorage.setItem('mohsin_admin_auth', 'true');
            var loginView = document.getElementById('login-view');
            var dashView = document.getElementById('dashboard-view');
            if (loginView) loginView.style.display = 'none';
            if (dashView) dashView.style.display = 'block';
            if (window.loadContent) {
                window.loadContent();
            }
            if (window.showToast) {
                window.showToast('Login successful! Welcome Admin.', 'success');
            }
        } else {
            alert('Invalid password! Default passcode is: admin123');
        }
        return false;
    }
    </script>
</head>
<body>

    <!-- 1. STUNNING CYBERPUNK LOGIN VIEW -->
    <div id="login-view" class="login-container">
        <div class="login-shield-badge">
            <i class="ph ph-shield-check"></i>
        </div>
        <h2>MD. MOHSIN<span class="dot">.</span></h2>
        <p class="login-subtitle">Admin Control Panel Security Portal</p>

        <form id="login-form" action="javascript:void(0);" onsubmit="return handleLoginSubmit(event);">
            <div class="form-group" style="position: relative;">
                <label for="admin-password">Admin Password</label>
                <div class="password-input-wrapper">
                    <i class="ph ph-lock-key input-icon-left"></i>
                    <input type="password" id="admin-password" placeholder="Enter password..." required autocomplete="current-password">
                    <i class="ph ph-eye input-icon-right" id="toggle-pass-btn" onclick="togglePasswordVisibility()" title="Toggle password visibility"></i>
                </div>
            </div>
            <button type="submit" class="btn btn-primary-glow" style="width: 100%; justify-content: center; margin-top: 10px;">
                Unlock Dashboard <i class="ph ph-arrow-right"></i>
            </button>
        </form>
        <div class="login-footer-hint">
            <i class="ph ph-info"></i> Default passcode: <code>admin123</code>
        </div>
    </div>

    <!-- 2. DASHBOARD VIEW -->
    <div id="dashboard-view" class="dashboard-container" style="display: none;">
        <header class="admin-header">
            <div>
                <h1>Portfolio Admin Control Panel<span class="dot">.</span></h1>
                <span style="font-size: 0.85rem; color: var(--text-muted);">Self-Service Content Management System</span>
            </div>
            <div style="display: flex; gap: 10px;">
                <button id="save-all-btn" class="btn"><i class="ph ph-floppy-disk"></i> Save All Changes</button>
                <button type="button" onclick="exportContentJson()" class="btn btn-secondary" title="Download updated content.json file for server deployment"><i class="ph ph-download-simple"></i> Export content.json</button>
                <button id="logout-btn" class="btn btn-secondary"><i class="ph ph-sign-out"></i> Logout</button>
            </div>
        </header>

        <div id="sections-container">
            <!-- Dynamically populated accordion forms mapped to content.json keys -->
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast toast-success" style="display: none;">Changes saved successfully!</div>

    <script src="/admin/admin.js?v=3.0"></script>
    <script src="admin.js?v=3.0"></script>
</body>
</html>
